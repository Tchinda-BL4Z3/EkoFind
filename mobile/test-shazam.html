<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Shazam Backend</title>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; text-align: center; padding: 50px; }
        #btn { width: 150px; height: 150px; border-radius: 50%; border: none; background: #0055ff; color: white; 
               font-size: 18px; cursor: pointer; transition: 0.3s; box-shadow: 0 0 20px rgba(0,85,255,0.5); }
        #btn:disabled { background: #333; cursor: not-allowed; }
        .recording { background: #ff0055 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #status { margin-top: 20px; color: #aaa; }
        #result { margin-top: 30px; padding: 20px; border: 1px solid #333; display: none; border-radius: 10px; }
    </style>
</head>
<body>

    <h1>Clone Shazam - Test Direct</h1>
    <button id="btn">Appuyer pour Écouter</button>
    <p id="status">Prêt à tester le backend...</p>

    <div id="result">
        <h2 id="song">Titre</h2>
        <p id="artist">Artiste</p>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        const resultDiv = document.getElementById('result');
        let mediaRecorder;
        let audioChunks = [];

        btn.onclick = async () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                return;
            }

            try {
                // 1. Demander le micro
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => audioChunks.push(event.data);

                mediaRecorder.onstop = async () => {
                    btn.classList.remove('recording');
                    btn.innerText = "Traitement...";
                    btn.disabled = true;
                    status.innerText = "Envoi au serveur Node.js...";

                    // 2. Créer le fichier audio (Blob)
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const formData = new FormData();
                    formData.append('audio', audioBlob, 'test.wav');

                    // 3. Envoyer au serveur (Localhost:3000)
                    try {
                        const response = await fetch('http://localhost:3000/identify', {
                            method: 'POST',
                            body: formData
                        });
                        const data = await response.json();

                        // 4. Afficher le résultat
                        document.getElementById('song').innerText = data.result.title;
                        document.getElementById('artist').innerText = data.result.artist;
                        resultDiv.style.display = 'block';
                        status.innerText = "Identification réussie !";
                    } catch (err) {
                        alert("Erreur: Le serveur Node.js ne répond pas ! (L'as-tu lancé ?)");
                    } finally {
                        btn.disabled = false;
                        btn.innerText = "Réessayer";
                    }
                };

                mediaRecorder.start();
                btn.classList.add('recording');
                btn.innerText = "J'écoute...";
                status.innerText = "Enregistrement en cours (5 secondes conseillées)...";

                // Arrêt auto après 5 secondes
                setTimeout(() => { if(mediaRecorder.state === "recording") mediaRecorder.stop(); }, 5000);

            } catch (err) {
                alert("Erreur micro : " + err);
            }
        };
    </script>
</body>
</html>
